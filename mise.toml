# mise configuration — https://mise.jdx.dev
# Applies inside this project directory.
#
# After cloning this repo, run `mise install` to fetch all tools.
# Make sure mise is on PATH (see docs/0-init/01-mise.md).

[tools]
# Python — managed by mise's built-in core backend (python-build).
python = "3.13"

# Node.js — required by firecrawl-mcp.
node = "lts"

# Firecrawl MCP server — https://github.com/firecrawl/firecrawl-mcp-server
# Exposed as the `firecrawl-mcp` binary on PATH. Configure Claude Code
# via the project-level .mcp.json (committed in this repo).
"npm:firecrawl-mcp" = "latest"

# uv — fast Python package manager. mise's pipx backend runs
# `uv tool install` under the hood when uv is available.
uv = "latest"

# Docling — local document parser (PDF/DOCX/PPTX/XLSX/images -> Markdown).
# Used by the `read-doc` skill (.claude/skills/read-doc). Isolated install
# via the pipx backend. Heavy: pulls PyTorch; first PDF parse also downloads
# models to ~/.cache/docling/models. The `easyocr` extra enables OCR for
# scanned PDFs/images (supports Vietnamese).
"pipx:docling" = { version = "latest", extras = "easyocr" }

# gitleaks — secret scanner. Used by the `pre-push-credentials-check` hook
# (.claude/settings.json → PreToolUse wrapper triggers only on `git push`).
# Single Go binary, no runtime dependencies. Rule set updated per release
# by the gitleaks team so we don't hand-roll regex.
# https://github.com/gitleaks/gitleaks
"aqua:gitleaks/gitleaks" = "latest"

# GitHub CLI — official `gh` command. Used to authenticate git pushes
# against github.com (e.g. `gh auth login`, `gh auth setup-git`).
# https://cli.github.com — distributed as a single binary via the github
# backend (replaces deprecated ubi), which downloads the release matching
# the current OS/arch (Windows/macOS/Linux).
"github:cli/cli" = "latest"

# wstunnel — WebSocket tunnel client used by the demo SSH task
# (see scripts/ssh_over_wstunnel.py and docs/1-customize/02-demo-server.md).
# Each release ships one archive per OS/arch, so auto-detect can't pick
# the right one. Pin via matching_regex so Linux/macOS/Windows all resolve.
# https://github.com/erebe/wstunnel
"github:erebe/wstunnel" = {
  version = "latest",
  matching_regex = '^wstunnel_\d+\.\d+\.\d+_(linux_amd64|linux_arm64|darwin_amd64|darwin_arm64|windows_amd64)\.tar\.gz$',
}

[tasks]
# --------------------------------------------------------------------------
# petstore-create — POST a Pet to the public Petstore demo server.
# Header `X-Student-Id` is sourced from $PETSTORE_STUDENT_ID (loaded from
# .env by `_.file` below) or overridden with --student-id.
#
# Usage:
#   mise run petstore-create
#   mise run petstore-create --student-id=nguyen-anh
# --------------------------------------------------------------------------
petstore-create = { run = [
  "uv run python scripts/petstore_create.py --student-id {{ env.PETSTORE_STUDENT_ID }}",
], description = "POST một Pet lên server demo (cần X-Student-Id)" }

# --------------------------------------------------------------------------
# ssh-logs — SSH through wstunnel to the demo server and run a command.
# Empty-password flow is handled via SSH_ASKPASS (cross-platform).
# Retries up to 5 times on transient 404/RST from VM public-proxy
# (10.15.94.54 — known issue, kiến trúc v2 passthrough).
#
# Usage:
#   mise run ssh-logs -- ls /data/petstore-logs
#   mise run ssh-logs -- uname -a
# --------------------------------------------------------------------------
ssh-logs = { run = [
  "uv run python scripts/ssh_over_wstunnel.py --student-id {{ env.PETSTORE_STUDENT_ID }} --",
], description = "SSH qua wstunnel tới server demo và chạy lệnh từ xa" }

[env]
# Default endpoint cho demo server — override trong `.env` khi cần.
PETSTORE_BASE_URL = "https://petstore-ai-course-demo.sandbox.vnpt-technology.vn:9443/api/v3"
PETSTORE_WSS_URL  = "wss://passthrough-ai-course-demo-ssh.sandbox.vnpt-technology.vn:9443"
PETSTORE_SSH_HOST = "localhost"
PETSTORE_SSH_PORT = "2222"
PETSTORE_SSH_USER = "student"

# Automatically creates and activates Python virtual environment at .venv
_.python.venv = { path = ".venv", create = true }

# Auto-load variables from a local .env file (gitignored). The .env file
# overrides nothing here unless the same key exists in both — the file
# wins because it is loaded after the static entries below. Use this to
# keep real tokens (Anthropic, GitHub, ...) out of committed config.
_.file = ".env"
